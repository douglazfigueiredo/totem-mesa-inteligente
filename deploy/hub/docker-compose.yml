name: totemmesa-hub

# Hub local da loja. O pareamento com o cloud é feito via UI admin
# (http://<ip>:4000/admin/cloud/pair) digitando o código gerado em
# /admin/hubs no cloud — não precisa mais de TENANT_ID/DEVICE_API_KEY
# em variáveis de ambiente.

services:
  hub:
    image: ghcr.io/${GH_OWNER:-douglazfigueiredo}/totem-mesa-inteligente-hub:${HUB_TAG:-stable}
    container_name: tm-hub
    restart: unless-stopped
    ports:
      - "${HUB_PORT:-4000}:4000"
    environment:
      NODE_ENV: production
      PORT: 4000
      LOG_LEVEL: ${LOG_LEVEL:-info}
      DATABASE_PATH: /data/hub.db
      ADMIN_SECRET: ${ADMIN_SECRET:?ADMIN_SECRET nao definido — rode install.sh ou edite .env}
      CATALOG_POLL_INTERVAL_MS: ${CATALOG_POLL_INTERVAL_MS:-60000}
    volumes:
      - hub-data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    labels:
      com.centurylinklabs.watchtower.enable: ${ENABLE_AUTO_UPDATE:-false}

  # Auto-update opcional (desligado por default — ativar com ENABLE_AUTO_UPDATE=true).
  # Em loja real é mais seguro atualizar manualmente via update.sh durante manutenção.
  watchtower:
    image: containrrr/watchtower:latest
    container_name: tm-watchtower
    restart: unless-stopped
    profiles: ["auto-update"]
    environment:
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_POLL_INTERVAL: "300"
      WATCHTOWER_LABEL_ENABLE: "true"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  hub-data:
