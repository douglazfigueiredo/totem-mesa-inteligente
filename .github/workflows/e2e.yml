name: E2E

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright:
    name: Playwright admin
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: ${{ secrets.E2E_DATABASE_URL }}
      AUTH_SECRET: e2e-secret-min-32-chars-padding-padding
      AUTH_URL: http://localhost:3100
      AUTH_TRUST_HOST: 'true'
      EMAIL_FROM: noreply@e2e.local
      EMAIL_DEV_OWNER: e2e@e2e.local
      EMAIL_SERVER_HOST: localhost
      EMAIL_SERVER_PORT: '2525'
      EMAIL_SERVER_USER: ''
      EMAIL_SERVER_PASSWORD: ''
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Apply DB migrations
        run: pnpm --filter @app/cloud db:migrate

      - name: Seed E2E tenant + owner
        run: pnpm --filter @app/cloud db:seed

      - name: Run E2E
        run: pnpm test:e2e

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
