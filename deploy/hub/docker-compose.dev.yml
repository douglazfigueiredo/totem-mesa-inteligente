name: totemmesa-hub-dev

# Versão dev — builda a imagem local a partir do Dockerfile.
# Útil pra validar mudanças antes de comitar / publicar no GHCR.

services:
  hub:
    build:
      context: ../..
      dockerfile: apps/hub/Dockerfile
    image: totemmesa/hub:dev
    container_name: tm-hub-dev
    restart: unless-stopped
    ports:
      - "4000:4000"
    # ADMIN_SECRET vem de apps/hub/.env (mesma fonte usada quando o hub
    # roda fora do Docker). Copie apps/hub/.env.example e gere o secret
    # com:  openssl rand -hex 32
    env_file:
      - ../../apps/hub/.env
    environment:
      NODE_ENV: development
      PORT: 4000
      LOG_LEVEL: info
      TENANT_SLUG: pizzaria-dev
      TENANT_NAME: Pizzaria Dev
      TENANT_VERTICAL: pizzaria
      TENANT_TABLES: 10
      DATABASE_PATH: /data/hub.db
    volumes:
      - hub-dev-data:/data

volumes:
  hub-dev-data:
