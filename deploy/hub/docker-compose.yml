name: totemmesa-hub

services:
  hub:
    image: ghcr.io/${GH_OWNER:-douglazfigueiredo}/totem-mesa-inteligente-hub:${HUB_TAG:-stable}
    container_name: tm-hub
    restart: unless-stopped
    ports:
      - "${HUB_PORT:-4000}:4000"
    environment:
      NODE_ENV: production
      PORT: 4000
      LOG_LEVEL: ${LOG_LEVEL:-info}
      TENANT_ID: ${TENANT_ID:?TENANT_ID nao definido — rode install.sh ou edite .env}
      DEVICE_API_KEY: ${DEVICE_API_KEY:?DEVICE_API_KEY nao definido}
      CLOUD_BASE_URL: ${CLOUD_BASE_URL:-https://app.totemmesa.com}
      DATABASE_PATH: /data/hub.db
    volumes:
      - hub-data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - tm-net

  redis:
    image: redis:7-alpine
    container_name: tm-redis
    restart: unless-stopped
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    volumes:
      - redis-data:/data
    networks:
      - tm-net

  watchtower:
    image: containrrr/watchtower:latest
    container_name: tm-watchtower
    restart: unless-stopped
    environment:
      WATCHTOWER_CLEANUP: "true"
      WATCHTOWER_POLL_INTERVAL: "300"
      WATCHTOWER_LABEL_ENABLE: "true"
      WATCHTOWER_INCLUDE_RESTARTING: "true"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    labels:
      com.centurylinklabs.watchtower.enable: "false"

volumes:
  hub-data:
  redis-data:

networks:
  tm-net:
    driver: bridge
