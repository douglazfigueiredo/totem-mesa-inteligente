# Build + push da imagem Docker do hub local para GHCR.
# DESABILITADO no Fase 0 — sera ativado quando Fase 2 fechar (hub funcional).
# Para ativar: trocar `if: false` para `if: true` ou remover a guarda.

name: Hub image (multi-arch)

on:
  push:
    branches: [main]
    paths:
      - "apps/hub/**"
      - "packages/**"
      - "deploy/hub/**"
      - ".github/workflows/hub-image.yml"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag adicional (alem do SHA / branch)"
        required: false

jobs:
  build:
    if: false # ativar na Fase 2
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/hub
          tags: |
            type=raw,value=stable,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=
            type=ref,event=branch
            type=raw,value=${{ inputs.tag }},enable=${{ inputs.tag != '' }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/hub/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
